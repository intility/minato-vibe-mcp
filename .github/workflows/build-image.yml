name: Build and push image

# Simpler than the platform template's release-please flow: build on push
# to main, push to ghcr, and pin deploy/base/kustomization.yaml in the same
# job. The skip-guard prevents the pin commit from triggering an infinite
# loop.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: "!startsWith(github.event.head_commit.message, 'chore(deploy): pin')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin image in kustomization
        env:
          GH_SHA: ${{ github.sha }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short="${GH_SHA:0:7}"
          repo_lower="${GH_REPO,,}"
          image_name="ghcr.io/${repo_lower}"

          sed -i -E \
            -e "s|^([[:space:]]*)newName:.*|\1newName: ${image_name}|" \
            -e "s|^([[:space:]]*)newTag:.*|\1newTag: sha-${short}|" \
            deploy/base/kustomization.yaml

          if git diff --quiet deploy/base/kustomization.yaml; then
            echo "kustomization already at sha-${short}; nothing to do"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deploy/base/kustomization.yaml
          git commit -m "chore(deploy): pin image to sha-${short}"
          git push
